  - name: detail
    params:
      analysis_image_path: outputs/smoothed.jpg
      color_output_path: outputs/mode_color.jpg
      output_path: outputs/mode_color_detail.jpg
      source_color_output_path: outputs/mode_color_detail_source.jpg
      source_gray_overlay_output_path: outputs/mode_color_detail_source_gray_overlay.jpg
      white_s_percentile: 0.15
      white_v_percentile: 0.5
      detail_hue_delta: 8 #越小越严格（更容易判成“非主色相”）
      detail_hue_min_saturation: 10 #越大越只看有颜色信息的像素
      detail_hue_min_value: 5 #越大越忽略暗部噪点
      morphology:
        enabled: true
        open_kernel: 5
        close_kernel: 3
        dilate_kernel: 5
        dilate_iterations: 1
        erode_kernel: 13
        erode_iterations: 1
