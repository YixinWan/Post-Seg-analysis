# pipeline参数配置示例
pipeline:
  - name: smooth
    params:
      ksize: 5
      output_path: outputs/smoothed.jpg
  - name: color
    params:
      output_path: outputs/mode_color.jpg
      min_cluster_pixels: 50
      peak_min_ratio: 0.35
      hist_smooth_kernel: 9
  - name: shadow
    params: {}
  - name: highlight
    params: {}
  - name: detail
    params: {}
