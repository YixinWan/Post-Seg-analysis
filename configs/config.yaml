# pipeline参数配置示例
pipeline:
  - name: smooth
    params:
      ksize: 5
      output_path: outputs/smoothed.jpg
  - name: color
    params:
      output_path: outputs/mode_color.jpg
      min_cluster_pixels: 50
      peak_min_ratio: 0.35
      hist_smooth_kernel: 9
  - name: shadow
    params:
      analysis_image_path: outputs/smoothed.jpg
      color_output_path: outputs/mode_color.jpg
      output_path: outputs/mode_color_shadow.jpg
      shadow_percentile: 0.5
      morphology:
        enabled: false
        open_kernel: 5
        close_kernel: 17
        dilate_kernel: 3
        dilate_iterations: 3
        erode_kernel: 5
        erode_iterations: 3
  - name: highlight
    params: {}
  - name: detail
    params: {}
