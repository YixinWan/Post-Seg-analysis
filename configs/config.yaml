# pipeline参数配置
pipeline:
  - name: smooth
    params:
      ksize: 5
      output_path: outputs/smoothed.jpg
  - name: color
    params:
      output_path: outputs/mode_color.jpg
      fill_mode: median_l # 可选: mode_color | median_l
      median_l_band_percentile: 0.3 # 仅 fill_mode=median_l 时生效，表示取 L 分布中间亮度带宽比例
      min_cluster_pixels: 50
      peak_min_ratio: 0.35
      hist_smooth_kernel: 9
